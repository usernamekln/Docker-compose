version : "3.9"
services:
  app:
    build: .
    container_name: myapp
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: mydb
    restart: always
    environment :
       POSTGRES_DB: testdb
       POSTGRES_USER: user
       POSTGRES_PASSWORD: password
    ports:
        - "5432:5432"
